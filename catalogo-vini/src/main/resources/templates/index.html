<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cantina Vini</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Il Mio Catalogo Vini</h1>
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        
        <div>
            <a th:href="@{/new}" class="btn btn-success me-2">Aggiungi Nuovo Vino</a>
            <a th:href="@{/clear}" class="btn btn-danger">Svuota Catalogo</a>
        </div>

        <form th:action="@{/}" method="get" class="d-flex m-0">
            <input type="text" name="ricerca" th:value="${valoreRicerca}" class="form-control me-2" placeholder="Cerca vino per nome...">
            <button type="submit" class="btn btn-outline-success">Cerca</button>
            <a th:href="@{/}" class="btn btn-outline-secondary ms-2">Cancella</a>
        </form>

    </div>

    <div th:if="${messaggioEliminazione}" class="alert alert-warning" role="alert" th:text="${messaggioEliminazione}">
    </div>

    <div th:if="${#lists.isEmpty(listaVini)}" class="alert alert-info">
        Il catalogo è attualmente vuoto. Aggiungi il primo vino!
    </div>

    <table th:unless="${#lists.isEmpty(listaVini)}" class="table table-striped align-middle">
        <thead class="table-dark">
            <tr>
                <th>Codice</th>
                <th>Nome</th>
                <th>Cantina</th>
                <th>Categoria</th>
                <th>Anno</th>
                <th>Azioni</th> </tr>
        </thead>
        <tbody>
            <tr th:each="v : ${listaVini}">
                <td>
                    <a th:href="@{/item/{id}(id=${v.id})}" th:text="${v.id}" class="text-decoration-none"></a>
                </td>
                <td th:text="${v.nome}"></td>
                <td th:text="${v.cantina}"></td>
                <td th:text="${v.categoria}"></td>
                <td th:text="${v.anno}"></td>
                <td>
                    <a th:href="@{/delete/{id}(id=${v.id})}" 
                       class="btn btn-sm btn-danger" 
                       onclick="return confirm('Sei sicuro di voler eliminare questo vino dal catalogo?');">
                       Elimina
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
