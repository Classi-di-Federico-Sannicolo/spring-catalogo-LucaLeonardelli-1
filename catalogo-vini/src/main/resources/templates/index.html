<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eremo D'Ambra - Collezione Vini</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- FONTS GOOGLE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Corinthia:wght@400;700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    
    <style>
        /* Sfondo e Testi Base */
        body {
            background: black;
            color: #f8f9fa;
            /* Nuovo font DM Sans per tutti i testi base */
            font-family: "DM Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400; /* 400 è lo spessore standard */
            font-style: normal;
            min-height: 100vh;
        }

        /* Titoli con Font Lussuoso */
        h1, h2, .luxury-font {
            font-family: "Corinthia", cursive;
            font-weight: 700;
            font-style: normal;
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #b38728, #FBF5B7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .luxury-font2 {
            font-family: "Playfair Display", serif;
            font-weight: 400;
            font-style: normal;
        }

        /* Pulsanti d'Oro */
        .btn-gold {
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #b38728, #FBF5B7);
            background-size: 200% 200%;
            color: #121212 !important;
            font-weight: 600;
            border: none;
            transition: all 0.4s ease;
        }
        .btn-gold:hover {
            background-position: right center;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        /* Pulsanti Argento/Scuro per azioni secondarie */
        .btn-silver {
            background: transparent;
            border: 1px solid #c0c0c0;
            color: #c0c0c0;
            transition: all 0.3s;
        }
        .btn-silver:hover {
            background: rgba(192, 192, 192, 0.1);
            color: #fff;
            border-color: #fff;
        }

        /* Pulsante Pericolo Lussuoso (Svuota/Elimina) */
        .btn-danger-luxury {
            /* Gradiente allungato per permettere un'animazione fluida */
            background: linear-gradient(135deg, #720e1e, #3a030c, #9e142a, #720e1e);
            background-size: 300% 300%;
            border: 1px solid #9e142a;
            color: #f8f9fa !important; /* Testo bianco ghiaccio ben leggibile */
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(114, 14, 30, 0.4); /* Ombra rossa alla base */
            transition: all 0.4s ease; /* Rende fluido TUTTO: ombra, bordo e movimento dello sfondo */
        }
        
        .btn-danger-luxury:hover {
            background-position: right center; /* Fa scorrere il gradiente rivelando la parte più chiara */
            box-shadow: 0 6px 15px rgba(220, 53, 69, 0.6); /* Bagliore rosso vivo che compare dolcemente */
            border-color: #ff4d4d;
        }

        /* Barra di Ricerca */
        .search-luxury {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: #fff;
        }
        .search-luxury:focus {
            background: rgba(0, 0, 0, 0.8);
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            color: #fff;
        }
        .search-luxury::placeholder {
            color: #777;
            font-style: italic;
        }

        /* Contenitore relativo per la barra di ricerca */
        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        /* Input di ricerca con spazio extra a destra per non coprire il testo con la X */
        .search-luxury {
            padding-right: 40px !important; 
        }

        /* La 'X' per resettare la ricerca */
        .clear-search {
            position: absolute;
            right: 15px;
            top: 4px;
            color: #c0c0c0; /* Argento di base */
            font-size: 1.5rem;
            text-decoration: none;
            line-height: 1;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* Effetto illuminazione rossa al passaggio del mouse */
        .clear-search:hover {
            color: #ff4d4d; /* Rosso acceso */
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.8); /* Alone luminoso */
        }

        /* Tabella Elegante */
        .table-luxury {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px; /* Spazio tra le righe */
            margin-top: 1rem;
        }
        .table-luxury th {
            font-family: Arial, Helvetica, sans-serif;
            color: #d4af37;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            padding: 10px 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        .table-luxury td {
            background: rgba(255, 255, 255, 0.04);
            padding: 16px 15px;
            color: #e0e0e0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        /* Arrotondamento solo agli estremi della riga */
        .table-luxury td:first-child { border-left: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px 0 0 8px; }
        .table-luxury td:last-child { border-right: 1px solid rgba(255, 255, 255, 0.05); border-radius: 0 8px 8px 0; }
        
        /* Hover sulla riga della tabella */
        .table-luxury tr:hover td {
            background: rgba(207, 165, 27, 0.205)
        }

        
        /* Arrotondamento completo e bordi per l'unica cella della cantina vuota */
        .table-luxury tr.empty-state-row td {
            border-radius: 8px !important;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Disabilita l'effetto hover per la riga "Cantina vuota" */
        .table-luxury tr.empty-state-row:hover td {
            background: rgba(255, 255, 255, 0.04); /* Mantiene lo sfondo base a riposo */
            cursor: default; /* Assicura che non compaia la manina cliccabile */
        }


        /* Link di Ordinamento */
        .sort-link {
            color: #d4af37;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .sort-link:hover {
            color: #fff;
        }

        /* Alert Lussuoso */
        .alert-luxury {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #d4af37;
            color: #d4af37;
        }
    </style>
</head>
<body class="container py-5">

    <div class="glass-panel">
        
        <div class="text-center mb-5">
            <h1 class="display-1 fw-bold mb-3" style="margin-top: 20px;">Eremo D'Ambra</h1>
            <p class="lead" style="font-style: italic; opacity: 0.7;">Cantina Vini dal 1840</p>
            <br>
            <hr style="border-color: #d4af37; height: 10px; width: 100px; margin: 0 auto;">
        </div>

        <div th:if="${messaggioEliminazione}" class="alert alert-luxury alert-dismissible fade show rounded-3" role="alert">
            <span th:text="${messaggioEliminazione}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="filter: brightness(0) invert(1); opacity: 0.7;"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <a th:href="@{/new}" class="btn btn-gold me-2 px-4 rounded-pill">Aggiungi Vino</a>
                <a th:href="@{/clear}" class="btn btn-danger-luxury px-4 rounded-pill">Svuota Cantina</a>
            </div>

            <form th:action="@{/}" method="get" class="d-flex m-0">
                <div class="search-wrapper me-2">
                    <input type="text" name="ricerca" th:value="${valoreRicerca}" class="form-control search-luxury rounded-pill px-4" placeholder="Cerca un vino...">
                    
                    <a th:if="${valoreRicerca != null and !valoreRicerca.isEmpty()}" th:href="@{/}" class="clear-search" title="Azzera ricerca">&times;</a>
                </div>
                <button type="submit" class="btn btn-silver rounded-pill px-4">Cerca</button>
            </form>
        </div>

        <div class="table-responsive">
            <table class="table-luxury">
                <thead>
                    <tr>
                        <th>
                            <a th:href="@{/(ricerca=${valoreRicerca}, sort='nome')}" class="sort-link">
                                Nome <span style="font-size: 0.7rem;">▼</span>
                            </a>
                        </th>
                        <th>
                            <a th:href="@{/(ricerca=${valoreRicerca}, sort='cantina')}" class="sort-link">
                                Cantina <span style="font-size: 0.7rem;">▼</span>
                            </a>
                        </th>
                        <th>
                            <a th:href="@{/(ricerca=${valoreRicerca}, sort='categoria')}" class="sort-link">
                                Categoria <span style="font-size: 0.7rem;">▼</span>
                            </a>
                        </th>
                        <th>
                            <a th:href="@{/(ricerca=${valoreRicerca}, sort='anno')}" class="sort-link">
                                Annata <span style="font-size: 0.7rem;">▼</span>
                            </a>
                        </th>
                        <th class="text-center"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="vino : ${listaVini}" 
                        th:onclick="|window.location.href='@{/item/{id}(id=${vino.id})}'|" 
                        style="cursor: pointer;"
                        title="Clicca per visualizzare i dettagli della bottiglia">
                        
                        <td class="luxury-font2 fs-5" th:text="${vino.nome}"></td>
                        <td th:text="${vino.cantina}"></td>
                        <td th:text="${vino.categoria}"></td>
                        <td th:text="${vino.anno}"></td>
                        
                        <td class="text-center">
                            <a th:href="@{/delete/{id}(id=${vino.id})}" 
                                class="btn btn-sm btn-danger-luxury rounded-pill px-3" 
                                onclick="event.stopPropagation(); return confirm('Rimuovere questa bottiglia dalla collezione?');">
                                Elimina
                            </a>
                        </td>
                    </tr>
                    
                    <tr th:if="${#lists.isEmpty(listaVini)}" class="empty-state-row">
                        <td colspan="5" class="text-center py-5">
                            <em class="fs-5" style="color: #c0c0c0; opacity: 0.7;">La cantina è vuota. Aggiungi la tua prima bottiglia.</em>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
