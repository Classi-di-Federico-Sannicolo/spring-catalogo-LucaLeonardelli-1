<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cantina Vini</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Il Mio Catalogo Vini</h1>

    <div th:if="${#lists.isEmpty(listaVini)}" class="alert alert-info">
        Il catalogo è attualmente vuoto. Aggiungi il primo vino!
    </div>

    <table th:unless="${#lists.isEmpty(listaVini)}" class="table table-striped">
        <thead>
            <tr>
                <th>Codice</th>
                <th>Nome</th>
                <th>Cantina</th>
                <th>Categoria</th>
                <th>Anno</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="v : ${listaVini}">
                <td th:text="${v.id}"></td>
                <td th:text="${v.nome}"></td>
                <td th:text="${v.cantina}"></td>
                <td th:text="${v.categoria}"></td>
                <td th:text="${v.anno}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
