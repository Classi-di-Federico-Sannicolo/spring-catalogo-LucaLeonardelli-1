<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Oops! Qualcosa è andato storto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Corinthia:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: url('/background-foto.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: #f8f9fa;
            font-family: "DM Sans", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .error-glass-panel {
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 50px;
            max-width: 600px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .error-glass-panel h1 {
            font-family: "Corinthia", cursive;
            font-weight: 700;
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #b38728, #FBF5B7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .error-glass-panel p.fs-3 {
            color: #d4af37;
            margin-bottom: 15px;
        }
        
        .error-glass-panel .lead {
            color: #c0c0c0;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        
        .btn-gold {
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #b38728, #FBF5B7);
            background-size: 200% 200%;
            color: #121212 !important;
            font-weight: 600;
            border: none;
            transition: all 0.4s ease;
            padding: 12px 40px;
        }
        
        .btn-gold:hover {
            background-position: right center;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>
    
    <div class="error-glass-panel">
        <h1 th:text="${status ?: 'Errore'}">404</h1>
        
        <p class="fs-3"> 
            <span class="text-danger">Oops!</span> Qualcosa è andato storto.
        </p>
        
        <p class="lead" th:text="${error ?: 'La pagina che cerchi non esiste o si è verificato un problema tecnico.'}">
            La pagina che cerchi non esiste o si è verificato un problema tecnico.
        </p>
        
        <a th:href="@{/}" class="btn btn-gold mt-4 rounded-pill">
            Torna al Catalogo Vini
        </a>
    </div>

</body>
</html>
