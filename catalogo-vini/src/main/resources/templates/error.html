<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eremo D'Ambra - Pagina Non Trovata</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;700&family=Playfair+Display+SC:wght@400;700;900&family=Corinthia&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0f0f0f;
            --card-color: #1a1a1a;
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top, #240a0a 0%, #0f0f0f 100%);
            color: #e0e0e0;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center; 
            text-align: center;
        }

        .luxury-title {
            font-family: 'Playfair Display SC', serif;
            letter-spacing: 2px;
            color: var(--gold);
        }

        .error-glass-panel {
            background: rgba(26, 26, 26, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            padding: 4rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .error-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: rgba(212, 175, 55, 0.15);
            filter: blur(80px);
            z-index: 0;
        }

        .error-number {
            font-family: 'Playfair Display SC', serif;
            font-size: 8rem;
            font-weight: 900;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 0;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }

        .error-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37 0%, #aa8c2c 100%);
            color: #0a0a0a !important; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .btn-gold:hover {
            background: linear-gradient(135deg, #eadd81 0%, #d4af37 100%);
            color: #000000 !important;
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="container py-5">

    <div class="row justify-content-center w-100 m-0">
        <div class="col-12 col-md-10 col-lg-8 col-xl-6">
            
            <div class="error-glass-panel">
                <div class="error-glow"></div>
                
                <div>
                    <span style="font-family: 'Corinthia', cursive; font-size: 3rem; color: #fff; position: relative; z-index: 1;">Bottiglia Non Trovata</span>
                </div>
                
                <h1 class="error-number mt-2 mb-3" th:text="${status ?: 'Errore'}">404</h1>
                
                <h3 class="luxury-title h4 mb-3" style="position: relative; z-index: 1;">Oops! Qualcosa è andato storto.</h3>
                
                <p class="error-text mb-5" th:text="${error ?: 'Sembra che tu ti sia perso nella nostra cantina. La pagina che cerchi non esiste o si è verificato un problema tecnico.'}">
                    Sembra che tu ti sia perso nella nostra cantina. La pagina che cerchi non esiste o si è verificato un problema tecnico.
                </p>
                
                <a th:href="@{/}" class="btn btn-gold px-5 py-3 rounded-pill shadow d-inline-flex align-items-center justify-content-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-arrow-left me-2" viewBox="0 0 16 16">
                      <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
                    </svg>
                    Torna al Catalogo Vini
                </a>
                
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
