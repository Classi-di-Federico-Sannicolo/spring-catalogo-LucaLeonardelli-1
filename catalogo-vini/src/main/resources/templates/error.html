<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Oops! Qualcosa è andato storto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-light">
    
    <div class="text-center text-dark">
        <h1 class="display-1 fw-bold text-danger" th:text="${status ?: 'Errore'}">404</h1>
        
        <p class="fs-3"> 
            <span class="text-danger">Oops!</span> Qualcosa è andato storto.
        </p>
        
        <p class="lead" th:text="${error ?: 'La pagina che cerchi non esiste o si è verificato un problema tecnico.'}">
            La pagina che cerchi non esiste o si è verificato un problema tecnico.
        </p>
        
        <a th:href="@{/}" class="btn btn-primary btn-lg mt-4">
            Torna al Catalogo Vini
        </a>
    </div>

</body>
</html>
