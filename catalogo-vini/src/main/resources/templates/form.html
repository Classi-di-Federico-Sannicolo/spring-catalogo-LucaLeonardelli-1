<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Aggiungi Vino</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Aggiungi un nuovo Vino</h2>

    <form th:action="@{/new}" th:object="${vino}" method="post" class="mt-4">
        
        <div class="mb-3">
            <label>Nome del Vino:</label>
            <input type="text" th:field="*{nome}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Cantina (Produttore):</label>
            <input type="text" th:field="*{cantina}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Categoria:</label>
            <select th:field="*{categoria}" class="form-select" required>
                <option value="">-- Seleziona una categoria --</option>
                <option value="Rosso">Rosso</option>
                <option value="Bianco">Bianco</option>
                <option value="Bollicine">Bollicine</option>
                <option value="Rosato">Rosato</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Anno:</label>
            <input type="number" th:field="*{anno}" class="form-control" min="1900" max="2026" required>
        </div>

        <button type="submit" class="btn btn-primary">Salva Vino</button>
        <a th:href="@{/}" class="btn btn-secondary">Annulla</a>
    </form>
</body>
</html>
