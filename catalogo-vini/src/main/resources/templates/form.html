<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eremo D'Ambra - Aggiungi Vino</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Corinthia:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    
    <style>
        /* Sfondo e Testi Base */
        body {
            background: black;
            color: #f8f9fa;
            font-family: "DM Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            min-height: 100vh;
        }

        /* Titoli con Font Lussuoso */
        h1, h2, .luxury-font {
            font-family: "Corinthia", cursive;
            font-weight: 700;
            font-style: normal;
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #b38728, #FBF5B7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Pulsanti d'Oro */
        .btn-gold {
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #b38728, #FBF5B7);
            background-size: 200% 200%;
            color: #121212 !important;
            font-weight: 600;
            border: none;
            transition: all 0.4s ease;
        }
        .btn-gold:hover {
            background-position: right center;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        /* Pulsanti Argento/Scuro per azioni secondarie */
        .btn-silver {
            background: transparent;
            border: 1px solid #c0c0c0;
            color: #c0c0c0;
            transition: all 0.3s;
        }
        .btn-silver:hover {
            background: rgba(192, 192, 192, 0.1);
            color: #fff;
            border-color: #fff;
        }

        /* --- NUOVI STILI PER IL FORM --- */
        
        /* Contenitore stile carta elegante */
        .form-glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Stile etichette (Label) */
        .form-label-luxury {
            color: #d4af37;
            font-family: Arial, Helvetica, sans-serif;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        /* Stile Input e Select */
        .input-luxury {
            background: rgba(0, 0, 0, 0.6) !important;
            border: 1px solid rgba(212, 175, 55, 0.4) !important;
            color: #fff !important;
            transition: all 0.3s ease;
        }
        
        .input-luxury:focus {
            background: rgba(0, 0, 0, 0.8) !important;
            border-color: #d4af37 !important;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2) !important;
            outline: none;
        }

        /* Stile per le opzioni del menu a tendina */
        select.input-luxury option {
            background-color: #1a1a1a;
            color: #fff;
        }
    </style>
</head>
<body class="container py-5">

    <div class="form-glass-panel mt-4">
        
        <div class="text-center mb-5">
            <h2 class="display-4 fw-bold">Aggiungi Vino</h2>
            <hr style="border-color: #d4af37; height: 10px; width: 60px; margin: 15px auto 0 auto;">
        </div>

        <form th:action="@{/new}" th:object="${vino}" method="post">
            
            <div class="mb-4">
                <label class="form-label-luxury">Nome del Vino</label>
                <input type="text" th:field="*{nome}" class="form-control input-luxury rounded-3 py-2" required placeholder="Es. Amarone della Valpolicella">
            </div>

            <div class="mb-4">
                <label class="form-label-luxury">Cantina (Produttore)</label>
                <input type="text" th:field="*{cantina}" class="form-control input-luxury rounded-3 py-2" required placeholder="Es. Masi">
            </div>

            <div class="mb-4">
                <label class="form-label-luxury">Categoria</label>
                <select th:field="*{categoria}" class="form-select input-luxury rounded-3 py-2" required>
                    <option value="" disabled selected>-- Seleziona una categoria --</option>
                    <option value="Rosso">Rosso</option>
                    <option value="Bianco">Bianco</option>
                    <option value="Bollicine">Bollicine</option>
                    <option value="Rosato">Rosato</option>
                </select>
            </div>

            <div class="mb-5">
                <label class="form-label-luxury">Annata</label>
                <input type="number" th:field="*{anno}" class="form-control input-luxury rounded-3 py-2" min="1900" max="2026" required placeholder="Es. 2015">
            </div>

            <div class="d-flex justify-content-between align-items-center mt-4">
                <a th:href="@{/}" class="btn btn-silver px-4 rounded-pill">Annulla</a>
                <button type="submit" class="btn btn-gold px-5 rounded-pill">Salva nella Collezione</button>
            </div>
            
        </form>
    </div>

</body>
</html>
