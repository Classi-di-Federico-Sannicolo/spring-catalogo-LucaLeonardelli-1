<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eremo D'Ambra - Aggiungi Vino</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;700&family=Playfair+Display+SC:wght@400;700;900&family=Corinthia&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0f0f0f;
            --card-color: #1a1a1a;
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top, #240a0a 0%, #0f0f0f 100%);
            color: #e0e0e0;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .luxury-title {
            font-family: 'Playfair Display SC', serif;
            letter-spacing: 2px;
            color: var(--gold);
        }

        .form-glass-panel {
            background: rgba(26, 26, 26, 0.85);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            padding: 3rem;
        }

        .form-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            background-color: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--gold) !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2) !important;
            background-color: rgba(0, 0, 0, 0.6) !important;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-select option {
            background-color: #1a1a1a;
            color: #fff;
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37 0%, #aa8c2c 100%);
            color: #0a0a0a !important; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .btn-gold:hover {
            background: linear-gradient(135deg, #eadd81 0%, #d4af37 100%);
            color: #000000 !important;
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .btn-gold:active {
            background: linear-gradient(135deg, #aa8c2c 0%, #8c7221 100%);
            box-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
        }

        .btn-outline-light-luxury {
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            background: transparent;
            font-weight: 500;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-outline-light-luxury:hover {
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="container py-5">

    <div class="row justify-content-center w-100 m-0">
        <div class="col-12 col-md-10 col-lg-8 col-xl-6">
            
            <div class="form-glass-panel">
                
                <div class="text-center mb-4">
                    <span style="font-family: 'Corinthia', cursive; font-size: 2.5rem; color: var(--gold);">Nuovo Arrivo</span>
                    <h2 class="luxury-title display-6 mt-1 mb-0">Aggiungi Bottiglia</h2>
                    <hr style="border-color: var(--gold); opacity: 0.3; width: 100px; margin: 20px auto;">
                </div>

                <form th:action="@{/new}" th:object="${vino}" method="post">
                    
                    <div class="mb-4">
                        <label class="form-label">Nome del Vino</label>
                        <input type="text" th:field="*{nome}" class="form-control" required placeholder="Es. Amarone della Valpolicella">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Cantina (Produttore)</label>
                        <input type="text" th:field="*{cantina}" class="form-control" required placeholder="Es. Masi">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Categoria</label>
                            <select th:field="*{categoria}" class="form-select" required>
                                <option value="" disabled selected>-- Seleziona --</option>
                                <option value="Rosso">Rosso</option>
                                <option value="Bianco">Bianco</option>
                                <option value="Bollicine">Bollicine</option>
                                <option value="Rosato">Rosato</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label" style="color: var(--gold);">Annata</label>
                            <input type="number" th:field="*{anno}" class="form-control" min="1800" max="2026" required placeholder="Es. 2015">
                        </div>
                    </div>

                    <div class="d-flex flex-column flex-sm-row gap-3 mt-4 pt-3 border-top" style="border-color: rgba(255,255,255,0.05) !important;">
                        <a th:href="@{/}" class="btn btn-outline-light-luxury px-4 py-3 rounded-pill flex-grow-1">
                            Annulla
                        </a>
                        <button type="submit" class="btn btn-gold px-4 py-3 rounded-pill shadow flex-grow-1">
                            Salva nella Collezione
                        </button>
                    </div>
                    
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
