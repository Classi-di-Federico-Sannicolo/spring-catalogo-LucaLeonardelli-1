<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eremo D'Ambra - Dettaglio Vino</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;700&family=Playfair+Display+SC:wght@400;700;900&family=Corinthia&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0f0f0f;
            --card-color: #1a1a1a;
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top, #240a0a 0%, #0f0f0f 100%);
            color: #e0e0e0;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center; 
        }

        .luxury-title {
            font-family: 'Playfair Display SC', serif;
            letter-spacing: 2px;
            color: var(--gold);
        }

        .alert-luxury {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: var(--gold);
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .form-glass-panel {
            background: rgba(26, 26, 26, 0.85);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative;
            backdrop-filter: blur(15px);
            overflow: hidden;
        }

        .detail-img-container {
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
            padding: 0; 
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: stretch;
            overflow: hidden;
        }

        .detail-img {
            width: 100%;
            height: 100%;
            min-height: 500px;
            object-fit: cover;  
            object-position: center;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.9)); 
        }

        .detail-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .detail-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-list li:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            color: #fff;
            font-size: 1.1rem;
            text-align: right;
        }

        .uuid-value {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--gold);
            opacity: 0.8;
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 5px;
        }

        .menu-dots {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 10;
        }

        #menuDots {
            background: transparent;
            color: var(--gold);
            border: none;
            font-size: 1.5rem;
            line-height: 1;
            padding: 5px 15px;
            border-radius: 50%;
            transition: 0.3s;
        }

        #menuDots:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .dropdown-menu-luxury {
            background: #1a1a1a;
            border: 1px solid var(--gold);
            border-radius: 15px;
            margin-top: 10px;
        }

        .dropdown-item-luxury {
            color: #ccc;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .dropdown-item-luxury:hover {
            background: var(--gold);
            color: #000;
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37 0%, #aa8c2c 100%);
            color: #0a0a0a !important; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .btn-gold:hover {
            background: linear-gradient(135deg, #eadd81 0%, #d4af37 100%);
            color: #000000 !important;
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .btn-gold:active {
            background: linear-gradient(135deg, #aa8c2c 0%, #8c7221 100%);
            box-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body class="container py-5">

    <div class="row justify-content-center w-100 m-0">
        <div class="col-12 col-xl-10">

            <div th:if="${messaggioSuccesso}" class="alert alert-luxury shadow mb-4" role="alert">
                <strong th:text="${messaggioSuccesso}"></strong>
            </div>

            <div class="form-glass-panel">
                
                <div class="menu-dots">
                    <div class="dropdown">
                        <button type="button" id="menuDots" data-bs-toggle="dropdown" aria-expanded="false">
                            ⋮
                        </button>
                        <ul class="dropdown-menu dropdown-menu-luxury shadow" aria-labelledby="menuDots">
                            <li><a class="dropdown-item dropdown-item-luxury" th:href="@{/modifica/{id}(id=${vino.id})}">Modifica Bottiglia</a></li>
                            <li><hr class="dropdown-divider" style="border-color: rgba(212, 175, 55, 0.2); margin: 5px 0;"></li>
                            <li>
                                <a class="dropdown-item dropdown-item-luxury" th:href="@{/delete/{id}(id=${vino.id})}" 
                                   style="color: #ff4757;" onclick="return confirm('Eliminare questa bottiglia?');">
                                   Elimina Definitivamente
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="row g-0 align-items-stretch">
                    <div class="col-md-5 detail-img-container d-none d-md-flex">
                        <img th:if="${vino.categoria == 'Rosso'}" th:src="@{/rosso.png}" class="detail-img" alt="Vino Rosso">
                        <img th:if="${vino.categoria == 'Bianco'}" th:src="@{/bianco.png}" class="detail-img" alt="Vino Bianco">
                        <img th:if="${vino.categoria == 'Bollicine'}" th:src="@{/bollicine.png}" class="detail-img" alt="Bollicine">
                        <img th:if="${vino.categoria == 'Rosato'}" th:src="@{/rosato.png}" class="detail-img" alt="Vino Rosato">
                        <img th:unless="${vino.categoria == 'Rosso' or vino.categoria == 'Bianco' or vino.categoria == 'Bollicine' or vino.categoria == 'Rosato'}" 
                             th:src="@{/background-foto.jpg}" class="detail-img" alt="Vino">
                    </div>

                    <div class="col-md-7 p-4 p-md-5 d-flex flex-column justify-content-center">
                        
                        <div class="mb-2">
                            <span style="font-family: 'Corinthia', cursive; font-size: 2.5rem; color: var(--gold);">Collezione Privata</span>
                        </div>
                        
                        <h2 class="luxury-title display-5 mb-4" th:text="${vino.nome}">Nome Vino</h2>

                        <ul class="detail-list mb-5">
                            <li>
                                <span class="detail-label">Codice Identificativo</span>
                                <span class="detail-value uuid-value" th:text="${vino.id}"></span>
                            </li>
                            <li>
                                <span class="detail-label">Cantina</span>
                                <span class="detail-value fw-bold text-white" th:text="${vino.cantina}"></span>
                            </li>
                            <li>
                                <span class="detail-label">Categoria</span>
                                <span class="detail-value" th:text="${vino.categoria}" style="color: var(--gold);"></span>
                            </li>
                            <li>
                                <span class="detail-label">Annata</span>
                                <span class="detail-value" th:text="${vino.anno}"></span>
                            </li>
                        </ul>

                        <div class="mt-auto pt-3 border-top" style="border-color: rgba(255,255,255,0.05) !important;">
                            <a th:href="@{/}" class="btn btn-gold px-5 py-3 rounded-pill w-100 d-inline-flex align-items-center justify-content-center shadow">
                                <span class="fw-bold">Torna alla Collezione</span>
                            </a>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
