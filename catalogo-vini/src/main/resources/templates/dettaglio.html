<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dettaglio Vino</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <div th:if="${messaggioSuccesso}" class="alert alert-success" role="alert" th:text="${messaggioSuccesso}">
    </div>

    <h2>Riepilogo Inserimento</h2>

    <div class="card mt-4">
        <div class="card-header bg-dark text-white">
            Dettagli del vino: <strong th:text="${vino.nome}"></strong>
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item"><strong>Codice UUID:</strong> <span th:text="${vino.id}"></span></li>
            <li class="list-group-item"><strong>Cantina:</strong> <span th:text="${vino.cantina}"></span></li>
            <li class="list-group-item"><strong>Categoria:</strong> <span th:text="${vino.categoria}"></span></li>
            <li class="list-group-item"><strong>Anno:</strong> <span th:text="${vino.anno}"></span></li>
        </ul>
    </div>

    <div class="mt-4">
        <a th:href="@{/}" class="btn btn-primary">Torna al Catalogo</a>
    </div>

</body>
</html>
