<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eremo D'Ambra - Dettaglio Vino</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Corinthia:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    
    <style>
        /* Sfondo e Testi Base */
        body {
            background: black;
            color: #f8f9fa;
            font-family: "DM Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            min-height: 100vh;
        }

        /* Titoli con Font Lussuoso */
        h1, h2, .luxury-font {
            font-family: "Corinthia", cursive;
            font-weight: 700;
            font-style: normal;
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #b38728, #FBF5B7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Font per i nomi dei vini */
        .luxury-font2 {
            font-family: "Playfair Display", serif;
            font-weight: 400;
            font-style: normal;
        }

        /* Contenitore stile carta elegante */
        .form-glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Alert Lussuoso (Per il messaggio di successo) */
        .alert-luxury {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #d4af37;
            color: #d4af37;
            text-align: center;
        }

        /* Pulsanti d'Oro */
        .btn-gold {
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #b38728, #FBF5B7);
            background-size: 200% 200%;
            color: #121212 !important;
            font-weight: 600;
            border: none;
            transition: all 0.4s ease;
        }
        .btn-gold:hover {
            background-position: right center;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        /* --- STILI LISTA DETTAGLI --- */
        .detail-list {
            list-style: none;
            padding: 0;
            margin: 0;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 10px;
        }
        
        .detail-list li {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .detail-list li:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #d4af37;
            font-family: Arial, Helvetica, sans-serif;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            margin: 0;
        }

        .detail-value {
            font-size: 1.1rem;
            color: #fff;
            text-align: right;
            margin: 0;
        }

        .uuid-value {
            font-family: monospace;
            font-size: 0.8rem;
            color: #777; /* Colore più tenue per non distrarre */
        }
    </style>
</head>
<body class="container py-5">

    <div th:if="${messaggioSuccesso}" class="alert alert-luxury rounded-3 mx-auto mb-4 shadow-sm" style="max-width: 600px;" role="alert">
        <strong th:text="${messaggioSuccesso}"></strong>
    </div>

    <div class="form-glass-panel mt-2">
        
        <div class="text-center mb-4">
            <h2 class="display-4 fw-bold">Dettaglio Bottiglia</h2>
            <hr style="border-color: #d4af37; height: 10px; width: 60px; margin: 15px auto;">
        </div>

        <div class="text-center mb-5">
            <h3 class="luxury-font2 display-6" th:text="${vino.nome}" style="color: #fff;"></h3>
        </div>

        <ul class="detail-list mb-5">
            <li>
                <span class="detail-label">Codice UUID</span>
                <span class="detail-value uuid-value" th:text="${vino.id}"></span>
            </li>
            <li>
                <span class="detail-label">Cantina</span>
                <span class="detail-value fw-bold" th:text="${vino.cantina}"></span>
            </li>
            <li>
                <span class="detail-label">Categoria</span>
                <span class="detail-value" th:text="${vino.categoria}"></span>
            </li>
            <li>
                <span class="detail-label">Annata</span>
                <span class="detail-value" th:text="${vino.anno}"></span>
            </li>
        </ul>

        <div class="text-center">
            <a th:href="@{/}" class="btn btn-gold px-5 py-2 rounded-pill w-100 fs-5">Torna alla Collezione</a>
        </div>
        
    </div>

</body>
</html>
