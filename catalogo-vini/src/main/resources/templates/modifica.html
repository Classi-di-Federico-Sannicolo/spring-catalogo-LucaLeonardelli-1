<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eremo D'Ambra - Modifica Vino</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Corinthia:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: url('/background-foto.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: #f8f9fa;
            font-family: "DM Sans", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
        }
        .luxury-font { font-family: "Corinthia", cursive; font-weight: 700; background: linear-gradient(135deg, #BF953F, #FCF6BA, #b38728, #FBF5B7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .form-glass-panel {
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 40px 40px 50px 40px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        /* Pulsanti d'Oro */
        .btn-gold {
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #b38728, #FBF5B7);
            background-size: 200% 200%;
            color: #121212 !important;
            font-weight: 600;
            border: none;
            transition: all 0.4s ease;
        }
        .btn-gold:hover {
            background-position: right center;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        /* Pulsanti Argento/Scuro per azioni secondarie */
        .btn-silver {
            background: transparent;
            border: 1px solid #c0c0c0;
            color: #c0c0c0;
            transition: all 0.3s;
        }
        .btn-silver:hover {
            background: rgba(192, 192, 192, 0.1);
            color: #fff;
            border-color: #fff;
        }
        
        /* Stili per gli input testuali e il select */
        .form-control-luxury, .form-select-luxury { 
            background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            color: #fff; 
        }
        .form-control-luxury:focus, .form-select-luxury:focus { 
            background: rgba(0,0,0,0.8); 
            border-color: #d4af37; 
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); 
            color: #fff; 
        }
        
        /* Colora di nero lo sfondo delle opzioni della tendina, altrimenti su alcuni browser diventano bianche illegibili */
        option { background-color: #121212; color: #fff; }
    </style>
</head>
<body class="container py-5">

    <div class="form-glass-panel">
        <div class="text-center mb-4">
            <h2 class="display-4 fw-bold luxury-font">Modifica Bottiglia</h2>
            <hr style="border-color: #d4af37; height: 10px; width: 60px; margin: 15px auto;">
        </div>

        <form th:action="@{/aggiorna}" th:object="${vino}" method="post">
            
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label class="form-label" style="color: #d4af37;">Nome Vino</label>
                <input type="text" th:field="*{nome}" class="form-control form-control-luxury" required>
            </div>

            <div class="mb-3">
                <label class="form-label" style="color: #d4af37;">Cantina</label>
                <input type="text" th:field="*{cantina}" class="form-control form-control-luxury" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" style="color: #d4af37;">Categoria</label>
                    <select th:field="*{categoria}" class="form-select form-select-luxury" required>
                        <option value="Rosso">Rosso</option>
                        <option value="Bianco">Bianco</option>
                        <option value="Bollicine">Bollicine</option>
                        <option value="Rosato">Rosato</option>
                    </select>
                </div>
                
                <div class="col-md-6 mb-4">
                    <label class="form-label" style="color: #d4af37;">Annata</label>
                    <input type="number" th:field="*{anno}" class="form-control form-control-luxury" required>
                </div>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <button type="button" class="btn btn-silver rounded-pill px-4" th:onclick="|window.location .href='@{/}'|">Annulla</button>
                <button type="submit" class="btn btn-gold px-5 py-2 rounded-pill">Salva Modifiche</button>
            </div>
        </form>
    </div>

</body>
</html>
