services:
  mysql-db:
    image: mysql:9.0
    container_name: cantina_container
    environment:
      MYSQL_DATABASE: cantina_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306" # mappa la porta del container alla stessa porta
    networks:
      - app-network

  # spring-backend:

networks:
  app-network:
    driver: bridge